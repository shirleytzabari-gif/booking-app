  </style>
</head>
<body>

<div class="container">

  <h2>קביעת פגישה</h2>

  <input id="name" type="text" placeholder="שם מלא">
  <input id="birth" type="date">
  <input id="email" type="email" placeholder="אימייל">
  <input id="password" type="password" placeholder="סיסמה">

<button onclick="register()">הרשמה</button>

<span class="link">כבר רשום? התחברות</span>

</div>

<script>
  function register() {
    const name = document.getElementById("name").value;
    const birth = document.getElementById("birth").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!name || !birth || !email || !password) {
      alert("יש למלא את כל השדות");
      return;
    }

    const user = {
      name: name,
      birth: birth,
      email: email,
      password: password
    };

    localStorage.setItem("user", JSON.stringify(user));

    alert("ההרשמה נשמרה בהצלחה");
  }
</script>

</body>
