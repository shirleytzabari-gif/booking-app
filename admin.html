<!DOCTYPE html>

<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ניהול מטפל</title>

<style>
body {
  font-family: Arial;
  background: #f5f7fb;
  margin: 0;
  display: flex;
  justify-content: center;
  padding-top: 40px;
}

.container {
  width: 100%;
  max-width: 360px;
  text-align: center;
}

.menu {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
}

.menu button {
  padding: 10px 14px;
  border-radius: 10px;
  background: #e5e7eb;
  border: none;
  cursor: pointer;
}

.menu button.active {
  background: #3b82f6;
  color: white;
}

.section {
  display: none;
}

.section.active {
  display: block;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button.main {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: #3b82f6;
  color: white;
  margin-top: 10px;
  cursor: pointer;
}

.list {
  text-align: right;
  margin-top: 15px;
  font-size: 14px;
}

.delete {
  color: red;
  cursor: pointer;
  margin-right: 10px;
}
</style>

</head>
<body>

<div class="container">

<h2>ניהול</h2>

<div class="menu">
  <button id="btnTreatments" class="active" onclick="showSection('treatments')">טיפולים</button>
  <button id="btnHours" onclick="showSection('hours')">שעות עבודה</button>
</div>

<div id="treatments" class="section active">

  <input id="treatmentName" placeholder="שם טיפול">
  <input id="duration" type="number" placeholder="משך בדקות">

<button class="main" onclick="addTreatment()">הוסף טיפול</button>

  <div class="list" id="treatmentsList"></div>

</div>

<div id="hours" class="section">

  <p>שלב הבא נבנה כאן את היומן</p>

</div>

</div>

<script>

function showSection(section) {
  document.getElementById("treatments").classList.remove("active");
  document.getElementById("hours").classList.remove("active");

  document.getElementById("btnTreatments").classList.remove("active");
  document.getElementById("btnHours").classList.remove("active");

  document.getElementById(section).classList.add("active");

  if (section === "treatments") {
    document.getElementById("btnTreatments").classList.add("active");
  } else {
    document.getElementById("btnHours").classList.add("active");
  }
}

function addTreatment() {
  const name = document.getElementById("treatmentName").value;
  const duration = document.getElementById("duration").value;

  if (!name || !duration) {
    alert("מלאי את כל השדות");
    return;
  }

  const data = JSON.parse(localStorage.getItem("treatments")) || [];

  data.push({name, duration});
  localStorage.setItem("treatments", JSON.stringify(data));

  document.getElementById("treatmentName").value = "";
  document.getElementById("duration").value = "";

  showTreatments();
}

function deleteTreatment(index) {
  const data = JSON.parse(localStorage.getItem("treatments")) || [];

  data.splice(index, 1);
  localStorage.setItem("treatments", JSON.stringify(data));

  showTreatments();
}

function showTreatments() {
  const data = JSON.parse(localStorage.getItem("treatments")) || [];
  const list = document.getElementById("treatmentsList");

  list.innerHTML = "";

  data.forEach((t, i)=>{
    list.innerHTML += `
      <div>
        ${t.name} - ${t.duration} דקות
        <span class="delete" onclick="deleteTreatment(${i})">מחק</span>
      </div>
    `;
  });
}

showTreatments();

</script>

</body>
</html>
