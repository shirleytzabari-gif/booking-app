<!DOCTYPE html>

<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ניהול</title>

<style>
body {
  font-family: Arial;
  background: #f5f7fb;
  margin: 0;
  display: flex;
  justify-content: center;
  padding-top: 40px;
}

.container {
  width: 100%;
  max-width: 400px;
  text-align: center;
}

/* תפריט אייקונים */
.menu {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-bottom: 25px;
}

.icon {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: #e5e7eb;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  font-size: 20px;
}

.icon.active {
  background: #3b82f6;
  color: white;
}

/* טקסט שמופיע בהובר */
.icon span {
  position: absolute;
  bottom: -25px;
  font-size: 12px;
  display: none;
}

.icon:hover span {
  display: block;
}

/* אזורים */
.section {
  display: none;
}

.section.active {
  display: block;
}

/* שדות */
input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 12px;
  border: 1px solid #ddd;
}

/* כפתור */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: #3b82f6;
  color: white;
  margin-top: 10px;
  cursor: pointer;
}

/* רשימה */
.list {
  text-align: right;
  margin-top: 15px;
}

.item {
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin-top: 8px;
  display: flex;
  justify-content: space-between;
}

.delete {
  color: red;
  cursor: pointer;
}
</style>

</head>
<body>

<div class="container">

<h2>ניהול</h2>

<div class="menu">
  <div class="icon active" onclick="show('treatments')" id="icon1">
    🩺
    <span>טיפולים</span>
  </div>

  <div class="icon" onclick="show('hours')" id="icon2">
    📅
    <span>שעות</span>
  </div>
</div>

<!-- טיפולים -->

<div id="treatments" class="section active">

  <input id="name" placeholder="שם טיפול">
  <input id="duration" type="number" placeholder="משך בדקות">

<button onclick="add()">הוסף טיפול</button>

  <div class="list" id="list"></div>

</div>

<!-- שעות -->

<div id="hours" class="section">

  <p>כאן נבנה יומן יפה בשלב הבא</p>

</div>

</div>

<script>

function show(section) {
  document.getElementById("treatments").classList.remove("active");
  document.getElementById("hours").classList.remove("active");

  document.getElementById(section).classList.add("active");

  document.getElementById("icon1").classList.remove("active");
  document.getElementById("icon2").classList.remove("active");

  if (section === "treatments") {
    document.getElementById("icon1").classList.add("active");
  } else {
    document.getElementById("icon2").classList.add("active");
  }
}

function add() {
  const name = document.getElementById("name").value;
  const duration = document.getElementById("duration").value;

  if (!name || !duration) {
    alert("מלאי הכל");
    return;
  }

  const data = JSON.parse(localStorage.getItem("treatments")) || [];

  data.push({name, duration});
  localStorage.setItem("treatments", JSON.stringify(data));

  showList();
}

function del(i) {
  const data = JSON.parse(localStorage.getItem("treatments")) || [];
  data.splice(i,1);
  localStorage.setItem("treatments", JSON.stringify(data));
  showList();
}

function showList() {
  const data = JSON.parse(localStorage.getItem("treatments")) || [];
  const list = document.getElementById("list");

  list.innerHTML = "";

  data.forEach((t,i)=>{
    list.innerHTML += `
      <div class="item">
        <div>${t.name} - ${t.duration} דק</div>
        <div class="delete" onclick="del(${i})">✖</div>
      </div>
    `;
  });
}

showList();

</script>

</body>
</html>
