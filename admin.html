<!DOCTYPE html>

<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>ניהול מטפל</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f7fb;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

```
.container {
  width: 100%;
  max-width: 320px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

.link {
  margin-top: 10px;
  color: #3b82f6;
  cursor: pointer;
  display: block;
}

.hidden {
  display: none;
}

.list {
  text-align: right;
  margin-top: 15px;
  font-size: 14px;
}
```

  </style>
</head>
<body>

<div class="container">

  <h2 id="title">כניסת מנהל</h2>

  <div id="auth">

```
<input id="email" type="email" placeholder="אימייל">
<input id="password" type="password" placeholder="סיסמה">

<button onclick="handleAuth()">כניסה</button>

<span class="link" onclick="toggleAuth()">אין לך חשבון? הרשמה</span>
```

  </div>

  <div id="dashboard" class="hidden">

```
<h3>סוגי טיפולים</h3>

<input id="treatmentName" type="text" placeholder="שם טיפול">
<input id="duration" type="number" placeholder="משך בדקות">

<button onclick="addTreatment()">הוסף טיפול</button>

<div class="list" id="treatmentsList"></div>

<h3>שעות עבודה</h3>

<input type="date" id="availDate">
<input type="time" id="startTime">
<input type="time" id="endTime">

<button onclick="saveAvailability()">שמור שעות</button>

<div class="list" id="availabilityList"></div>
```

  </div>

</div>

<script>

let isRegister = false;

function toggleAuth() {
  isRegister = !isRegister;

  document.getElementById("title").innerText = isRegister ? "הרשמת מנהל" : "כניסת מנהל";
  document.querySelector("#auth button").innerText = isRegister ? "הרשמה" : "כניסה";
  document.querySelector(".link").innerText = isRegister ? "יש לך חשבון? כניסה" : "אין לך חשבון? הרשמה";
}

function handleAuth() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("יש למלא את כל השדות");
    return;
  }

  let admin = JSON.parse(localStorage.getItem("admin"));

  if (isRegister) {
    admin = { email, password };
    localStorage.setItem("admin", JSON.stringify(admin));
    alert("נרשמת בהצלחה");
  } else {
    if (!admin || email !== admin.email || password !== admin.password) {
      alert("פרטים שגויים");
      return;
    }
    alert("התחברת בהצלחה");
  }

  document.getElementById("auth").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");

  showTreatments();
  showAvailability();
}

function addTreatment() {
  const name = document.getElementById("treatmentName").value;
  const duration = document.getElementById("duration").value;

  if (!name || !duration) {
    alert("יש למלא את כל השדות");
    return;
  }

  const treatments = JSON.parse(localStorage.getItem("treatments")) || [];

  treatments.push({ name, duration });

  localStorage.setItem("treatments", JSON.stringify(treatments));

  document.getElementById("treatmentName").value = "";
  document.getElementById("duration").value = "";

  showTreatments();
}

function showTreatments() {
  const treatments = JSON.parse(localStorage.getItem("treatments")) || [];
  const list = document.getElementById("treatmentsList");

  list.innerHTML = "";

  treatments.forEach(t => {
    list.innerHTML += `<div>${t.name} - ${t.duration} דקות</div>`;
  });
}

function saveAvailability() {
  const date = document.getElementById("availDate").value;
  const start = document.getElementById("startTime").value;
  const end = document.getElementById("endTime").value;

  if (!date || !start || !end) {
    alert("יש למלא את כל השדות");
    return;
  }

  const availability = JSON.parse(localStorage.getItem("availability")) || [];

  availability.push({ date, start, end });

  localStorage.setItem("availability", JSON.stringify(availability));

  showAvailability();
}

function showAvailability() {
  const availability = JSON.parse(localStorage.getItem("availability")) || [];
  const list = document.getElementById("availabilityList");

  list.innerHTML = "";

  availability.forEach(a => {
    list.innerHTML += `<div>${a.date} | ${a.start} - ${a.end}</div>`;
  });
}

</script>

</body>
</html>
