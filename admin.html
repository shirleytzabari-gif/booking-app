<!DOCTYPE html>

<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ניהול</title>

<style>
body {
  font-family: Arial;
  background: #f5f7fb;
  margin: 0;
  display: flex;
  justify-content: center;
  padding-top: 40px;
}

.container {
  width: 100%;
  max-width: 360px;
  text-align: center;
}

.tabs {
  display: flex;
  margin-bottom: 20px;
}

.tab {
  flex: 1;
  padding: 10px;
  background: #e5e7eb;
  cursor: pointer;
}

.tab.active {
  background: #3b82f6;
  color: white;
}

.section {
  display: none;
}

.section.active {
  display: block;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: #3b82f6;
  color: white;
  margin-top: 10px;
  cursor: pointer;
}

.list {
  text-align: right;
  margin-top: 15px;
  font-size: 14px;
}

.slot {
  padding: 10px;
  margin: 6px 0;
  border-radius: 10px;
  background: #e5e7eb;
  cursor: pointer;
}

.slot.selected {
  background: #3b82f6;
  color: white;
}
</style>

</head>
<body>

<div class="container">

<h2>ניהול</h2>

<div class="tabs">
  <div class="tab active" onclick="switchTab(0)">טיפולים</div>
  <div class="tab" onclick="switchTab(1)">שעות עבודה</div>
</div>

<div id="treatmentsSection" class="section active">

  <input id="treatmentName" placeholder="שם טיפול">
  <input id="duration" type="number" placeholder="משך בדקות">

<button onclick="addTreatment()">הוסף טיפול</button>

  <div class="list" id="treatmentsList"></div>

</div>

<div id="availabilitySection" class="section">

  <input type="date" id="date">

  <div id="hours"></div>

<button onclick="saveDay()">שמור יום</button>

  <div class="list" id="availabilityList"></div>

</div>

</div>

<script>

function switchTab(index) {
  document.querySelectorAll(".tab").forEach((t,i)=>{
    t.classList.toggle("active", i===index);
  });

  document.getElementById("treatmentsSection").classList.toggle("active", index===0);
  document.getElementById("availabilitySection").classList.toggle("active", index===1);
}

/* טיפולים */

function addTreatment() {
  const name = document.getElementById("treatmentName").value;
  const duration = document.getElementById("duration").value;

  if (!name || !duration) {
    alert("מלאי את כל השדות");
    return;
  }

  const data = JSON.parse(localStorage.getItem("treatments")) || [];

  data.push({name, duration});
  localStorage.setItem("treatments", JSON.stringify(data));

  document.getElementById("treatmentName").value = "";
  document.getElementById("duration").value = "";

  showTreatments();
}

function showTreatments() {
  const data = JSON.parse(localStorage.getItem("treatments")) || [];
  const list = document.getElementById("treatmentsList");

  list.innerHTML = "";

  data.forEach(t=>{
    list.innerHTML += `<div>${t.name} - ${t.duration} דקות</div>`;
  });
}

/* שעות */

let selectedSlots = [];

function createHours() {
  const container = document.getElementById("hours");
  container.innerHTML = "";

  for (let h=8; h<=20; h++) {
    const time = (h<10 ? "0"+h : h) + ":00";

    const div = document.createElement("div");
    div.className = "slot";
    div.innerText = time;

    div.onclick = ()=>{
      div.classList.toggle("selected");

      if (selectedSlots.includes(time)) {
        selectedSlots = selectedSlots.filter(t=>t!==time);
      } else {
        selectedSlots.push(time);
      }
    };

    container.appendChild(div);
  }
}

function saveDay() {
  const date = document.getElementById("date").value;

  if (!date || selectedSlots.length===0) {
    alert("בחרי תאריך ושעות");
    return;
  }

  const data = JSON.parse(localStorage.getItem("availability")) || {};

  data[date] = selectedSlots;

  localStorage.setItem("availability", JSON.stringify(data));

  selectedSlots = [];

  document.querySelectorAll(".slot").forEach(s=>s.classList.remove("selected"));

  showAvailability();
}

function showAvailability() {
  const data = JSON.parse(localStorage.getItem("availability")) || {};
  const list = document.getElementById("availabilityList");

  list.innerHTML = "";

  for (let d in data) {
    list.innerHTML += `<div>${d} : ${data[d].join(", ")}</div>`;
  }
}

createHours();
showTreatments();
showAvailability();

</script>

</body>
</html>
