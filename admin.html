<!DOCTYPE html>

<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ניהול</title>

<style>
body {
  font-family: Arial;
  background: #f3f4f6;
  margin: 0;
  display: flex;
  justify-content: center;
  padding-top: 40px;
}

.container {
  width: 100%;
  max-width: 420px;
  text-align: center;
}

h2 {
  margin-bottom: 20px;
}

/* אייקונים */

.menu {
  display: flex;
  justify-content: center;
  gap: 15px;
}

.icon {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #e5e7eb;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 24px;
}

.icon.active {
  background: #6366f1;
  color: white;
}

/* מסכים */

.section {
  display: none;
  margin-top: 25px;
}

.section.active {
  display: block;
}

/* יומן */

.week-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 15px 0;
}

.nav-btn {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
}

.week-days {
  display: flex;
  gap: 6px;
  overflow-x: auto;
}

.day {
  min-width: 60px;
  padding: 10px;
  border-radius: 12px;
  background: white;
  cursor: pointer;
  font-size: 13px;
  border: 1px solid #eee;
}

.day.selected {
  border: 2px solid #6366f1;
}

.day.holiday {
  background: #fef3c7;
}

.day.past {
  opacity: 0.4;
  pointer-events: none;
}

/* שדות */

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 12px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: #6366f1;
  color: white;
  margin-top: 10px;
  cursor: pointer;
}

/* רשימה */

.saved {
  margin-top: 15px;
  text-align: right;
}

.saved-item {
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin-top: 6px;
}

</style>

</head>
<body>

<div class="container">

<h2>ניהול</h2>

<div class="menu">
  <div class="icon active" onclick="show('hours')" id="iconHours">🕒</div>
</div>

<div id="hours" class="section active">

  <div class="week-header">
    <button class="nav-btn" onclick="changeWeek(-1)">‹</button>
    <div id="weekTitle"></div>
    <button class="nav-btn" onclick="changeWeek(1)">›</button>
  </div>

  <div class="week-days" id="weekDays"></div>

  <input type="time" id="start">
  <input type="time" id="end">

<button onclick="save()">שמור שעות</button>

  <div class="saved" id="saved"></div>

</div>

</div>

<script>

let currentDate = new Date();
let selectedDate = null;

function show(section) {
  document.getElementById("hours").classList.add("active");
}

/* יומן */

function getWeekStart(date) {
  const d = new Date(date);
  const day = d.getDay();
  return new Date(d.setDate(d.getDate() - day));
}

async function renderWeek() {
  const container = document.getElementById("weekDays");
  container.innerHTML = "";

  const today = new Date();
  today.setHours(0,0,0,0);

  const start = getWeekStart(currentDate);

  document.getElementById("weekTitle").innerText =
    start.toLocaleDateString("he-IL");

  const res = await fetch("https://www.hebcal.com/hebcal?v=1&cfg=json&i=on&lg=he&year=" + currentDate.getFullYear());
  const data = await res.json();

  const holidays = {};
  data.items.forEach(h=>{
    holidays[h.date] = h.hebrew || h.title;
  });

  for (let i = 0; i < 7; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);

    const dateStr = d.toISOString().split("T")[0];
    const dayName = d.toLocaleDateString("he-IL", { weekday: "short" });

    const div = document.createElement("div");
    div.className = "day";

    if (d < today) div.classList.add("past");
    if (dayName.includes("ש") || holidays[dateStr]) div.classList.add("holiday");

    div.innerHTML = `${dayName}<br>${d.getDate()}`;

    div.onclick = () => {
      if (d < today) return;

      selectedDate = dateStr;

      document.querySelectorAll(".day").forEach(d=>d.classList.remove("selected"));
      div.classList.add("selected");
    };

    container.appendChild(div);
  }
}

function changeWeek(offset) {
  currentDate.setDate(currentDate.getDate() + offset * 7);
  renderWeek();
}

/* שמירה */

function save() {
  if (!selectedDate) {
    alert("בחרי יום");
    return;
  }

  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;

  if (!start || !end) {
    alert("מלאי שעות");
    return;
  }

  const data = JSON.parse(localStorage.getItem("hours")) || [];

  data.push({date: selectedDate, start, end});
  localStorage.setItem("hours", JSON.stringify(data));

  renderSaved();
}

function renderSaved() {
  const data = JSON.parse(localStorage.getItem("hours")) || [];
  const container = document.getElementById("saved");

  container.innerHTML = "";

  data.forEach(h=>{
    container.innerHTML += `
      <div class="saved-item">
        ${h.date} | ${h.start} - ${h.end}
      </div>
    `;
  });
}

renderWeek();
renderSaved();

</script>

</body>
</html>
