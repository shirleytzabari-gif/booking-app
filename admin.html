<!DOCTYPE html>

<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ניהול</title>

<style>
body {
  font-family: Arial;
  background: #f5f7fb;
  margin: 0;
  display: flex;
  justify-content: center;
  padding-top: 40px;
}

.container {
  width: 100%;
  max-width: 420px;
  text-align: center;
}

.menu {
  display: flex;
  justify-content: center;
  gap: 20px;
}

.icon {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: #e5e7eb;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 30px;
}

.icon.active {
  background: #3b82f6;
  color: white;
}

.section {
  display: none;
  margin-top: 25px;
}

.section.active {
  display: block;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 12px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: #3b82f6;
  color: white;
  margin-top: 10px;
  cursor: pointer;
}

.list {
  margin-top: 15px;
  text-align: right;
}

.item {
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin-top: 8px;
  display: flex;
  justify-content: space-between;
}

.delete {
  color: red;
  cursor: pointer;
}

.calendar {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  margin-bottom: 15px;
}

.day {
  min-width: 70px;
  padding: 10px;
  border-radius: 10px;
  background: white;
  cursor: pointer;
}

.day.holiday {
  background: #fef3c7;
}

.day.selected {
  border: 2px solid #3b82f6;
}

#holidayName {
  margin-bottom: 10px;
  font-weight: bold;
  color: #92400e;
}
</style>

</head>
<body>

<div class="container">

<h2>ניהול</h2>

<div class="menu">
  <div class="icon active" onclick="show('types')" id="iconTypes">💡</div>
  <div class="icon" onclick="show('hours')" id="iconHours">🕒</div>
</div>

<div id="types" class="section active">

  <input id="name" placeholder="שם פגישה">
  <input id="duration" type="number" placeholder="משך בדקות">

<button onclick="add()">הוסף</button>

  <div class="list" id="list"></div>

</div>

<div id="hours" class="section">

  <div id="holidayName"></div>

  <div class="calendar" id="calendar"></div>

  <input type="date" id="date">
  <input type="time" id="start">
  <input type="time" id="end">

<button onclick="save()">שמור</button>

  <div class="list" id="hoursList"></div>

</div>

</div>

<script>

function show(section) {
  document.getElementById("types").classList.remove("active");
  document.getElementById("hours").classList.remove("active");

  document.getElementById(section).classList.add("active");

  document.getElementById("iconTypes").classList.remove("active");
  document.getElementById("iconHours").classList.remove("active");

  if (section === "types") {
    document.getElementById("iconTypes").classList.add("active");
  } else {
    document.getElementById("iconHours").classList.add("active");
  }
}

function add() {
  const name = document.getElementById("name").value;
  const duration = document.getElementById("duration").value;

  if (!name || !duration) {
    alert("מלאי הכל");
    return;
  }

  const data = JSON.parse(localStorage.getItem("types")) || [];

  data.push({name, duration});
  localStorage.setItem("types", JSON.stringify(data));

  showList();
}

function del(i) {
  const data = JSON.parse(localStorage.getItem("types")) || [];
  data.splice(i,1);
  localStorage.setItem("types", JSON.stringify(data));
  showList();
}

function showList() {
  const data = JSON.parse(localStorage.getItem("types")) || [];
  const list = document.getElementById("list");

  list.innerHTML = "";

  data.forEach((t,i)=>{
    list.innerHTML += `
      <div class="item">
        <div>${t.name} - ${t.duration} דק</div>
        <div class="delete" onclick="del(${i})">✖</div>
      </div>
    `;
  });
}

function save() {
  const date = document.getElementById("date").value;
  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;

  if (!date || !start || !end) {
    alert("מלאי הכל");
    return;
  }

  const data = JSON.parse(localStorage.getItem("hours")) || [];

  data.push({date, start, end});
  localStorage.setItem("hours", JSON.stringify(data));

  showHours();
}

function showHours() {
  const data = JSON.parse(localStorage.getItem("hours")) || [];
  const list = document.getElementById("hoursList");

  list.innerHTML = "";

  data.forEach(h=>{
    list.innerHTML += `
      <div class="item">
        <div>${h.date} | ${h.start} - ${h.end}</div>
      </div>
    `;
  });
}

async function renderCalendar() {
  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  const today = new Date();

  const res = await fetch("https://www.hebcal.com/hebcal?v=1&cfg=json&maj=on&i=on&lg=he&year=" + today.getFullYear());
  const data = await res.json();

  const holidays = {};
  data.items.forEach(h=>{
    holidays[h.date] = h.hebrew || h.title;
  });

  for (let i = 0; i < 7; i++) {
    const d = new Date();
    d.setDate(today.getDate() + i);

    const dateStr = d.toISOString().split("T")[0];
    const dayName = d.toLocaleDateString("he-IL", { weekday: "short" });

    const div = document.createElement("div");
    div.className = "day";

    if (dayName.includes("ש") || holidays[dateStr]) {
      div.classList.add("holiday");
    }

    div.innerHTML = `${dayName}<br>${d.getDate()}/${d.getMonth()+1}`;

    div.onclick = () => {
      document.getElementById("date").value = dateStr;

      document.querySelectorAll(".day").forEach(d=>d.classList.remove("selected"));
      div.classList.add("selected");

      document.getElementById("holidayName").innerText = holidays[dateStr] || "";
    };

    calendar.appendChild(div);
  }
}

showList();
showHours();
renderCalendar();

</script>

</body>
</html>
