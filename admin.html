<!DOCTYPE html>

<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ניהול</title>

<style>
body {
  font-family: Arial;
  background: #f5f7fb;
  margin: 0;
  display: flex;
  justify-content: center;
  padding-top: 40px;
}

.container {
  width: 100%;
  max-width: 500px;
  text-align: center;
}

.menu {
  display: flex;
  justify-content: center;
  gap: 20px;
}

.icon {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: #e5e7eb;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 30px;
}

.icon.active {
  background: #3b82f6;
  color: white;
}

.section {
  display: none;
  margin-top: 25px;
}

.section.active {
  display: block;
}

input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: #3b82f6;
  color: white;
  margin-top: 10px;
  cursor: pointer;
}

.list {
  margin-top: 10px;
  text-align: right;
}

.item {
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin-top: 6px;
  display: flex;
  justify-content: space-between;
}

/* יומן שבועי */

.week-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 15px 0;
}

.week-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}

.day {
  background: white;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
}

.day.selected {
  border: 2px solid #3b82f6;
}

.day.holiday {
  background: #fef3c7;
}

</style>

</head>
<body>

<div class="container">

<h2>ניהול</h2>

<div class="menu">
  <div class="icon active" onclick="show('types')" id="iconTypes">💡</div>
  <div class="icon" onclick="show('hours')" id="iconHours">🕒</div>
</div>

<!-- סוגים -->

<div id="types" class="section active">

  <input id="name" placeholder="שם פגישה">
  <input id="duration" type="number" placeholder="משך בדקות">

<button onclick="add()">הוסף</button>

  <div class="list" id="list"></div>

</div>

<!-- שעות -->

<div id="hours" class="section">

  <div class="week-header">
    <button onclick="changeWeek(-1)">◀</button>
    <div id="weekTitle"></div>
    <button onclick="changeWeek(1)">▶</button>
  </div>

  <div class="week-days" id="weekDays"></div>

  <input type="time" id="start">
  <input type="time" id="end">

<button onclick="save()">שמור שעות</button>

</div>

</div>

<script>

let currentDate = new Date();
let selectedDate = null;

function show(section) {
  document.getElementById("types").classList.remove("active");
  document.getElementById("hours").classList.remove("active");

  document.getElementById(section).classList.add("active");

  document.getElementById("iconTypes").classList.remove("active");
  document.getElementById("iconHours").classList.remove("active");

  if (section === "types") {
    document.getElementById("iconTypes").classList.add("active");
  } else {
    document.getElementById("iconHours").classList.add("active");
  }
}

/* סוגי פגישות */

function add() {
  const name = document.getElementById("name").value;
  const duration = document.getElementById("duration").value;

  if (!name || !duration) {
    alert("מלאי הכל");
    return;
  }

  const data = JSON.parse(localStorage.getItem("types")) || [];
  data.push({name, duration});
  localStorage.setItem("types", JSON.stringify(data));

  showList();
}

function showList() {
  const data = JSON.parse(localStorage.getItem("types")) || [];
  const list = document.getElementById("list");

  list.innerHTML = "";

  data.forEach((t,i)=>{
    list.innerHTML += `
      <div class="item">
        <div>${t.name} - ${t.duration} דק</div>
      </div>
    `;
  });
}

/* יומן */

function getWeekStart(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day;
  return new Date(d.setDate(diff));
}

async function renderWeek() {
  const container = document.getElementById("weekDays");
  container.innerHTML = "";

  const start = getWeekStart(currentDate);

  document.getElementById("weekTitle").innerText =
    start.toLocaleDateString("he-IL");

  const res = await fetch("https://www.hebcal.com/hebcal?v=1&cfg=json&i=on&lg=he&year=" + currentDate.getFullYear());
  const data = await res.json();

  const holidays = {};
  data.items.forEach(h=>{
    holidays[h.date] = h.hebrew || h.title;
  });

  for (let i = 0; i < 7; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);

    const dateStr = d.toISOString().split("T")[0];
    const dayName = d.toLocaleDateString("he-IL", { weekday: "short" });

    const div = document.createElement("div");
    div.className = "day";

    if (dayName.includes("ש") || holidays[dateStr]) {
      div.classList.add("holiday");
    }

    div.innerHTML = `${dayName}<br>${d.getDate()}`;

    div.onclick = () => {
      selectedDate = dateStr;

      document.querySelectorAll(".day").forEach(d=>d.classList.remove("selected"));
      div.classList.add("selected");
    };

    container.appendChild(div);
  }
}

function changeWeek(offset) {
  currentDate.setDate(currentDate.getDate() + (offset * 7));
  renderWeek();
}

/* שמירת שעות */

function save() {
  if (!selectedDate) {
    alert("בחרי יום");
    return;
  }

  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;

  if (!start || !end) {
    alert("מלאי שעות");
    return;
  }

  const data = JSON.parse(localStorage.getItem("hours")) || [];
  data.push({date: selectedDate, start, end});
  localStorage.setItem("hours", JSON.stringify(data));

  alert("נשמר");
}

showList();
renderWeek();

</script>

</body>
</html>
