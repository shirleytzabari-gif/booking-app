<!DOCTYPE html>

<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ניהול</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f3f4f6;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

h2 {
  text-align: center;
}

.menu {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-bottom: 20px;
}

.icon {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #e5e7eb;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 24px;
}

.icon.active {
  background: #6366f1;
  color: white;
}

.section {
  display: none;
}

.section.active {
  display: block;
}

/* יומן */

.calendar {
  display: grid;
  grid-template-columns: 80px repeat(7, 1fr);
  border-top: 1px solid #ddd;
}

.time {
  height: 40px;
  font-size: 12px;
  text-align: center;
  border-bottom: 1px solid #eee;
}

.cell {
  height: 40px;
  border-bottom: 1px solid #eee;
  border-left: 1px solid #eee;
  position: relative;
}

.available {
  background: #fbcfe8;
}

.booked {
  background: #86efac;
  font-size: 10px;
  padding: 2px;
}

.holiday {
  background: #fef3c7;
}

.header {
  display: grid;
  grid-template-columns: 80px repeat(7, 1fr);
  margin-bottom: 5px;
}

.day {
  text-align: center;
  font-weight: bold;
}

/* טפסים */

input, select {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #6366f1;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

.item {
  background: white;
  padding: 10px;
  margin-top: 6px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
}
</style>

</head>
<body>

<div class="container">

<h2>ניהול</h2>

<div class="menu">
  <div class="icon active" onclick="show('profile')" id="i1">👤</div>
  <div class="icon" onclick="show('types')" id="i2">💡</div>
  <div class="icon" onclick="show('calendar')" id="i3">🕒</div>
</div>

<!-- פרטים -->

<div id="profile" class="section active">

  <input id="fullname" placeholder="שם מלא">
  <input id="email" placeholder="אימייל">
  <input id="phone" placeholder="טלפון">
  <input id="business" placeholder="שם העסק">

<button onclick="saveProfile()">שמור</button>

</div>

<!-- סוגי פגישות -->

<div id="types" class="section">

  <input id="tname" placeholder="שם פגישה">
  <input id="tduration" type="number" placeholder="משך בדקות">

<button onclick="addType()">הוסף</button>

  <div id="typesList"></div>

</div>

<!-- יומן -->

<div id="calendar" class="section">

  <div class="header" id="header"></div>
  <div class="calendar" id="calendarGrid"></div>

</div>

</div>

<script>

function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".icon").forEach(i=>i.classList.remove("active"));
  event.target.classList.add("active");
}

/* פרופיל */

function saveProfile(){
  const data={
    name:fullname.value,
    email:email.value,
    phone:phone.value,
    business:business.value
  };
  localStorage.setItem("profile",JSON.stringify(data));
  alert("נשמר");
}

/* סוגי פגישות */

function addType(){
  let data=JSON.parse(localStorage.getItem("types"))||[];
  data.push({name:tname.value,duration:tduration.value});
  localStorage.setItem("types",JSON.stringify(data));
  renderTypes();
}

function renderTypes(){
  let data=JSON.parse(localStorage.getItem("types"))||[];
  typesList.innerHTML="";
  data.forEach((t,i)=>{
    typesList.innerHTML+=`
      <div class="item">
        ${t.name} - ${t.duration} דק
        <button onclick="delType(${i})">מחק</button>
      </div>
    `;
  });
}

function delType(i){
  let data=JSON.parse(localStorage.getItem("types"));
  data.splice(i,1);
  localStorage.setItem("types",JSON.stringify(data));
  renderTypes();
}

renderTypes();

/* יומן */

const startHour=5;
const endHour=22;

function renderCalendar(){

  header.innerHTML="<div></div>";

  const days=["א","ב","ג","ד","ה","ו","ש"];

  for(let d=0;d<7;d++){
    header.innerHTML+=`<div class="day">${days[d]}</div>`;
  }

  calendarGrid.innerHTML="";

  for(let h=startHour;h<=endHour;h++){

    calendarGrid.innerHTML+=`<div class="time">${h}:00</div>`;

    for(let d=0;d<7;d++){

      calendarGrid.innerHTML+=`
        <div class="cell"
        onclick="addBooking(this)">
        </div>
      `;
    }
  }
}

function addBooking(cell){

  let name=prompt("שם מטופל");
  if(!name)return;

  let type=prompt("סוג פגישה");
  if(!type)return;

  cell.classList.add("booked");
  cell.innerHTML=name+"<br>"+type;
}

renderCalendar();

</script>

</body>
</html>
