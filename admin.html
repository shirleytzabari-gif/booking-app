<body>

<div class="container">

  <h2>ניהול זמינות</h2>

  <input type="date" id="date">
  <input type="text" id="times" placeholder="שעות מופרדות בפסיק לדוגמה 09:00,10:00">

<button onclick="save()">שמור זמינות</button>

  <div class="list" id="list"></div>

</div>

<script>

function save() {
  const date = document.getElementById("date").value;
  const times = document.getElementById("times").value.split(",");

  if (!date || times.length === 0) {
    alert("יש למלא תאריך ושעות");
    return;
  }

  const data = JSON.parse(localStorage.getItem("availability")) || {};

  data[date] = times;

  localStorage.setItem("availability", JSON.stringify(data));

  alert("נשמר בהצלחה");

  show();
}

function show() {
  const data = JSON.parse(localStorage.getItem("availability")) || {};
  const list = document.getElementById("list");

  list.innerHTML = "";

  for (let date in data) {
    list.innerHTML += `<div>${date} : ${data[date].join(", ")}</div>`;
  }
}

show();

</script>

</body>
