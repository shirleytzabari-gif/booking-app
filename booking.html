<body>

<div class="container">

  <h2>קביעת תור</h2>

  <input type="date" id="date">

  <div class="times" id="times"></div>

<button class="confirm" onclick="book()">אישור תור</button>

</div>

<script>

const allTimes = ["09:00", "10:00", "11:00", "12:00", "16:00", "17:00"];

let selectedTime = null;

document.getElementById("date").addEventListener("change", function() {
  const container = document.getElementById("times");
  container.innerHTML = "";

  allTimes.forEach(time => {
    const btn = document.createElement("button");
    btn.innerText = time;

    btn.onclick = () => {
      selectedTime = time;

      document.querySelectorAll(".times button").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
    };

    container.appendChild(btn);
  });
});

function book() {
  const date = document.getElementById("date").value;

  if (!date || !selectedTime) {
    alert("יש לבחור תאריך ושעה");
    return;
  }

  const appointment = {
    date: date,
    time: selectedTime
  };

  localStorage.setItem("appointment", JSON.stringify(appointment));

  alert("התור נקבע בהצלחה");
}

</script>

</body>
